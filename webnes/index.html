<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebNES</title>
  <meta name="description" content="NES emulator in the browser.">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="emulator-container">
    <div class="screen" id="screen">
      <!-- Double original resolution: 512x480 -->
      <div class="screen-viewport">
        <canvas id="nes-canvas" width="256" height="240"></canvas>

        <div class="drop-zone" id="drop-zone">
          <p>Drop a .nes file here</p>
          <p class="sub">or <button class="link-btn" id="browse-btn">browse</button></p>
        </div>

        <div class="pause-overlay hidden" id="pause-overlay">PAUSED</div>
      </div>
    </div>

    <div class="screen-controls">
      <div class="controls-left">
        <span id="rom-name" class="rom-name">No ROM</span>
        <span id="status-text" class="status">Ready</span>
        <span id="fps-counter" class="fps">— fps</span>
      </div>
      <div class="controls-right">
        <button id="btn-play-pause" disabled>Pause</button>
        <button id="btn-fullscreen">Fullscreen</button>
        <button id="btn-keybindings">Options</button>
        <label class="btn-primary" for="rom-input">Load ROM</label>
        <input type="file" id="rom-input" accept=".nes" class="sr-only">
      </div>
    </div>
  </div>

  <!-- Keybindings & Options Modal -->
  <div class="modal hidden" id="keybindings-modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>Options & Keybindings</h3>
        <button class="close-btn" id="btn-close-modal">&times;</button>
      </div>
      
      <table class="bindings">
        <tbody>
          <tr><td><kbd>Arrow keys</kbd></td><td>D-Pad</td></tr>
          <tr><td><kbd>Z</kbd></td><td>A</td></tr>
          <tr><td><kbd>X</kbd></td><td>B</td></tr>
          <tr><td><kbd>Enter</kbd></td><td>Start</td></tr>
          <tr><td><kbd>Shift</kbd></td><td>Select</td></tr>
          <tr><td><kbd>P</kbd></td><td>Pause</td></tr>
          <tr><td><kbd>R</kbd></td><td>Reset</td></tr>
        </tbody>
      </table>

      <div class="settings-group">
        <div class="setting">
          <label for="toggle-scanlines">Scanlines</label>
          <input type="checkbox" id="toggle-scanlines" checked>
        </div>
        <div class="setting">
          <label for="toggle-smooth">Smooth scaling</label>
          <input type="checkbox" id="toggle-smooth">
        </div>
      </div>
    </div>
  </div>

  <!-- Mobile touch pad -->
  <div class="touch-pad hidden" id="touch-controller">
    <div class="t-dpad">
      <button class="t-btn" id="touch-up">↑</button>
      <div class="t-row">
        <button class="t-btn" id="touch-left">←</button>
        <button class="t-btn" id="touch-right">→</button>
      </div>
      <button class="t-btn" id="touch-down">↓</button>
    </div>
    <div class="t-meta">
      <button class="t-btn t-sm" id="touch-select">SEL</button>
      <button class="t-btn t-sm" id="touch-start">STA</button>
    </div>
    <div class="t-face">
      <button class="t-btn t-face-b" id="touch-b">B</button>
      <button class="t-btn t-face-a" id="touch-a">A</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
